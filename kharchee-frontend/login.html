<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | kharchee</title>

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/auth.css">
</head>

<body>

<header class="header">
<div class="logo-area">
<img src="assets/images/logo.png" class="logo" alt="kharchee logo">
<span class="site-name">kharchee</span>
</div>

<div class="auth-buttons">
<a href="index.html" class="btn btn-outline">Home</a>
<a href="register.html" class="btn btn-outline">Register</a>
</div>
</header>

<section class="auth-section">
<div class="auth-card">

<h2>Login to kharchee</h2>
<p class="sub-text">Track your shared expenses easily</p>

<form id="loginForm">

<div class="form-group">
<label>Email</label>
<input type="email" name="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Enter your password" required>
</div>

<p class="form-error"></p>

<button type="submit" class="btn-submit">Login</button>

<p class="switch-link">
Don't have an account?
<a href="register.html">Register</a>
</p>

</form>

</div>
</section>

<script src="js/common.js"></script>

<script src="js/auth.js"></script>

</body>
</html>
