<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | kharchee</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-area">
            <img src="assets/images/logo.png" class="logo" alt="kharchee logo">
            <span class="site-name">kharchee</span>
        </div>

        <div class="auth-buttons">
            <!-- 🏠 HOME BUTTON -->
            <a href="index.html" class="btn btn-outline">Home</a>

            <!-- LOGIN BUTTON -->
            <a href="login.html" class="btn btn-outline">Login</a>
        </div>
    </header>

    <!-- REGISTER FORM -->
    <section class="auth-section">
        <div class="auth-card">
            <h2>Create Your Account</h2>
            <p class="sub-text">Start tracking your expenses smartly</p>

            <form id="registerForm">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="Enter mobile number" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Create password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                </div>

                <p class="form-error"></p>

                <button type="submit" class="btn-submit">Register</button>

                <p class="switch-link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </form>
        </div>
    </section>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
